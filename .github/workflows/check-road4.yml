name: Check Road4

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check Road4 health
        run: |
          RESPONSE=$(curl -s -m 20 https://telegram-road4-bot.onrender.com/health)

          echo "RAW RESPONSE:"
          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | jq -r '.status')

          echo "PARSED STATUS:"
          echo "$STATUS"

          if [ "$STATUS" != "ok" ]; then
            echo "Road4 health check failed"
            exit 1
          fi
